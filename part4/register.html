<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Register</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/icon.png" type="image/png">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo-text">hbnb</a>
            <div style="flex: 1;"></div>
            <div class="user-menu">
                <a href="index.html" class="login-button">← Back to Home</a>
            </div>
        </div>
    </header>


    <main>
        <div class="main-content" style="padding-top: 80px; display: flex; justify-content: center;">
            <div class="form">
                <h2>Finish signing up</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="first-name">First Name:</label>
                    <input type="text" id="first-name" name="first-name" required>
                </div>
                <div class="form-group">
                    <label for="last-name">Last Name:</label>
                    <input type="text" id="last-name" name="last-name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit">Create Account</button>
            </form>
            <p style="text-align: center; margin-top: 20px; color: #717171;">
                Already have an account? <a href="login.html" style="color: #FF5A5F; text-decoration: none;">Sign in</a>
            </p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts-stable.js"></script>
</body>
</html>
