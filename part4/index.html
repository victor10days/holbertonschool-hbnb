<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>HBnB - Home</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/icon.png" type="image/png">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo-text">hbnb</a>
            <div class="search-bar">
                <input type="text" class="search-input" placeholder="Start your search">
                <button class="search-button">
                    <svg width="16" height="16" viewBox="0 0 32 32" fill="currentColor">
                        <path d="M13 24c6.075 0 11-4.925 11-11S19.075 2 13 2 2 6.925 2 13s4.925 11 11 11zm8-3l9 9-2 2-9-9v-1.5l-.5-.5C16.775 22.775 15.025 24 13 24c-6.075 0-11-4.925-11-11S6.925 2 13 2s11 4.925 11 11c0 2.025-1.225 3.775-3 5.5l.5.5H21z"/>
                    </svg>
                </button>
            </div>
            <div class="user-menu">
                <a href="login.html" class="user-menu-button" id="login-link">
                    <span>☰</span>
                    <div style="width: 30px; height: 30px; background: #717171; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px;">?</div>
                </a>
            </div>
        </div>
    </header>


    <div class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title">Not sure where to go? Perfect.</h1>
            <p class="hero-subtitle">Discover stays to live, work or just relax.</p>
            <div class="hero-search">
                <input type="text" placeholder="Search destinations">
                <button>I'm flexible</button>
            </div>
        </div>
    </div>

    <main>
        <div class="main-content">
            <div class="content-section">
                <div class="section-header">
                    <h2 class="section-title">Stay anywhere</h2>
                    <p class="section-subtitle">Keep calm & travel on</p>
                </div>

                <div class="filters-bar">
                    <div class="price-filter-container">
                        <span style="font-weight: 600; color: #222222;">Price:</span>
                        <select id="price-filter">
                            <option value="all">Any price</option>
                            <option value="10">Under $10</option>
                            <option value="50">Under $50</option>
                            <option value="100">Under $100</option>
                        </select>
                    </div>
                    <div class="filters-toggle">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <path d="M5 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zM8 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0zM13 7a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/>
                        </svg>
                        <span>Filters</span>
                    </div>
                </div>

                <section id="places-list">
                    <!-- Places will be dynamically loaded here -->
                </section>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 HBnB. All rights reserved.</p>
    </footer>

    <script src="mockup-data.js"></script>
    <script src="scripts-stable.js"></script>
</body>
</html>
